<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Sistema</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <h2>🖥️ Monitor</h2>
        <ul>
            <li class="active">Visão Geral</li>
            <li>Processos</li>
            <li>Rede</li>
        </ul>
        <button id="themeToggle">Alternar Tema</button>
        <a href="/export/pdf" class="btn-export">📄 Exportar PDF</a>
    </div>

    <div class="main-content">
        <header>
            <h1>Gerenciador de Tarefas</h1>
            <div id="alertsContainer"></div>
        </header>

        <div class="cards-grid">
            <div class="card">
                <h3>CPU</h3>
                <h2 id="cpuVal">0%</h2>
            </div>
            <div class="card">
                <h3>RAM</h3>
                <h2 id="ramVal">0%</h2>
                <small id="ramInfo"></small>
            </div>
            <div class="card">
                <h3>Disco</h3>
                <h2 id="diskVal">0%</h2>
            </div>
            <div class="card">
                <h3>Rede (IP: <span id="ipVal">-</span>)</h3>
                <h2 id="netVal" style="font-size: 1.2em; margin-top: 10px;">↓ 0 MB/s | ↑ 0 MB/s</h2>
                <small>Conexões Ativas: <span id="connVal">0</span></small>
            </div>
        </div>

        <div class="charts-grid">
            <div class="card chart-card">
                <h3>Uso de CPU e Memória (Histórico 5m)</h3>
                <div class="chart-container">
                    <canvas id="historyChart"></canvas>
                </div>
            </div>
            <div class="card processes-card">
                <h3>Top Processos (Consumo de RAM)</h3>
                <table id="procTable">
                    <thead>
                        <tr>
                            <th>PID</th>
                            <th>Nome</th>
                            <th>CPU (%)</th>
                            <th>RAM (%)</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
